<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Полный тест: ОС и Linux (130 вопросов)</title>
  <style>
    :root {
      --primary: #3b82f6; --primary-hover: #2563eb;
      --success: #16a34a; --error: #dc2626;
      --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --text-muted: #64748b;
      --border: #e2e8f0; --radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; padding: 16px; padding-bottom: 40px; }
    .container { max-width: 800px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 24px; }
    header h1 { font-size: 1.6rem; margin-bottom: 6px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    header p { color: var(--text-muted); font-size: 0.9rem; }
    
    .stats-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; background: var(--card); padding: 10px 14px; border-radius: var(--radius); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 16px; font-weight: 600; position: sticky; top: 8px; z-index: 10; border: 1px solid var(--border); font-size: 0.85rem; }
    .progress-line { height: 4px; background: var(--border); border-radius: 2px; margin: 0 0 20px 0; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.4s ease; }

    .question-card { background: var(--card); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: 1px solid var(--border); }
    .q-text { font-size: 1rem; font-weight: 600; margin-bottom: 12px; color: var(--text); }
    .q-num { color: var(--primary); margin-right: 4px; }
    
    .options { display: flex; flex-direction: column; gap: 10px; }
    .option { display: flex; align-items: center; padding: 12px 14px; border: 2px solid var(--border); border-radius: 10px; cursor: pointer; transition: all 0.2s; background: #fafafa; min-height: 48px; font-size: 0.9rem; }
    .option:hover:not(.disabled) { border-color: var(--primary); background: #eff6ff; }
    .option input { margin-right: 10px; accent-color: var(--primary); transform: scale(1.2); flex-shrink: 0; }

    .option.disabled { pointer-events: none; opacity: 0.9; }
    .option.correct { border-color: var(--success); background: #f0fdf4; color: var(--success); text-decoration: underline; text-decoration-color: var(--success); text-decoration-thickness: 2.5px; text-underline-offset: 4px; font-weight: 600; }
    .option.wrong { border-color: var(--error); background: #fef2f2; color: var(--error); }

    .btn { background: var(--primary); color: white; border: none; padding: 14px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; margin-top: 14px; transition: all 0.2s; width: 100%; font-size: 1rem; }
    .btn:hover:not(:disabled) { background: var(--primary-hover); transform: translateY(-2px); }
    .btn:disabled { background: #cbd5e1; cursor: not-allowed; }
    .btn.checked { background: var(--success); cursor: default; }
    .feedback { margin-top: 8px; font-weight: 500; min-height: 22px; font-size: 0.9rem; }

    #restart-btn { display: none; margin: 20px auto; width: 100%; max-width: 260px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); padding: 16px; }
    #restart-btn:hover { opacity: 0.95; transform: translateY(-2px); }

    @media (min-width: 640px) {
      header h1 { font-size: 2rem; }
      .stats-bar { padding: 12px 20px; font-size: 0.95rem; }
      .question-card { padding: 20px; }
      .option { padding: 14px 16px; font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div class="container">

      <div class="stat">✅ Верно: <b id="score">0</b></div>

    <div class="progress-line"><div class="progress-fill" id="progress-fill"></div></div>
    <div id="quiz-container"></div>

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

document.addEventListener('DOMContentLoaded', () => {
  let score = 0;
  let answered = 0;
  const total = QUESTIONS.length;
  const container = document.getElementById('quiz-container');
  const scoreEl = document.getElementById('score');
  const progressEl = document.getElementById('progress');
  const percentEl = document.getElementById('percent');
  const progressFill = document.getElementById('progress-fill');

  QUESTIONS.forEach((item, idx) => {
    const card = document.createElement('div');
    card.className = 'question-card';
    
    const allOptions = shuffle([item.c, ...item.w]);
    let optsHtml = '';
    allOptions.forEach(opt => {
      optsHtml += `<label class="option" data-val="${opt}">
        <input type="radio" name="q${idx}" value="${opt}"><span>${opt}</span>
      </label>`;
    });

    card.innerHTML = `
      <div class="q-text"><span class="q-num">${idx + 1}.</span>${item.q}</div>
      <div class="options">${optsHtml}</div>
      <button class="btn check-btn" disabled>Ответить</button>
      <div class="feedback"></div>
    `;
    container.appendChild(card);

    const radios = card.querySelectorAll('input');
    const btn = card.querySelector('.check-btn');
    const feedback = card.querySelector('.feedback');

    radios.forEach(r => r.addEventListener('change', () => { btn.disabled = false; }));

    btn.addEventListener('click', () => {
      const sel = card.querySelector('input:checked');
      if (!sel) return;
      const selVal = sel.value;
      const opts = card.querySelectorAll('.option');

      opts.forEach(opt => {
        opt.classList.add('disabled');
        const val = opt.dataset.val;
        if (val === item.c) opt.classList.add('correct');
        else if (val === selVal && selVal !== item.c) opt.classList.add('wrong');
      });

      btn.disabled = true;
      btn.textContent = 'Проверено';
      btn.classList.add('checked');
      answered++;
      
      if (selVal === item.c) {
        score++; scoreEl.textContent = score;
        feedback.innerHTML = '✅ <span style="color:var(--success)">Верно!</span>';
      } else {
        feedback.innerHTML = '❌ <span style="color:var(--error)">Неверно. Правильный ответ подчёркнут.</span>';
      }

      progressEl.textContent = total - answered;
      const pct = Math.round((answered / total) * 100);
      percentEl.textContent = pct + '%';
      progressFill.style.width = pct + '%';

      if (answered === total) {
        document.getElementById('restart-btn').style.display = 'block';
        document.getElementById('restart-btn').scrollIntoView({ behavior: 'smooth' });
      }
    });
  });
});
</script>
